<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskWeb{% block title_suffix %}{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav>
  <a href="{{ url_for('index') }}" class="{% if request.endpoint == 'index' %}active{% endif %}">Pending</a>
  <a href="{{ url_for('completed') }}" class="{% if request.endpoint == 'completed' %}active{% endif %}">Completed</a>
  <a href="{{ url_for('deleted') }}" class="{% if request.endpoint == 'deleted' %}active{% endif %}">Deleted</a>
</nav>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% for category, message in messages %}
    <div class="flash flash-{{ category }}">{{ message }}</div>
  {% endfor %}
{% endwith %}

{% block content %}{% endblock %}

<footer>
  TaskWeb v{{ version }} &middot; Taskwarrior web interface
</footer>

<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
