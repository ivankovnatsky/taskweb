[formatter.ruff]
command = "ruff"
options = ["format"]
includes = ["*.py"]

[formatter.ruff-check]
command = "ruff"
options = ["check", "--fix"]
includes = ["*.py"]

[formatter.nix]
command = "nixfmt"
includes = ["*.nix"]

[formatter.prettier]
command = "prettier"
options = ["--write", "--prose-wrap", "always"]
includes = ["*.md", "*.json", "*.yml", "*.yaml", "*.js", "*.css", "*.html"]
